name: Build Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        env:
          NODE_VERSION: "20.18.1"
        run: |
          bash scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SimpleHub ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/release/simplehub-linux-x64.tar.gz
            dist/release/simplehub-linux-arm64.tar.gz
            dist/release/SHA256SUMS
            scripts/install.sh
            scripts/install-alwaysdata.sh
